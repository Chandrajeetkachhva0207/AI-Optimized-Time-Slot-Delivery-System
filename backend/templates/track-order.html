<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking | SmartParcel AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a25;
      --accent: #6c63ff;
      --accent2: #ff6b6b;
      --accent3: #00d2ff;
      --green: #00c896;
      --text: #f0f0f8;
      --muted: #8888aa;
      --border: rgba(108, 99, 255, 0.15);
      --border2: rgba(255, 255, 255, 0.06);
      --radius: 16px;
      --radius-lg: 24px
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 700px 500px at 5% 10%, rgba(108, 99, 255, .07) 0%, transparent 70%), radial-gradient(ellipse 500px 400px at 90% 70%, rgba(0, 210, 255, .05) 0%, transparent 70%)
    }

    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10, 10, 15, .92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      height: 64px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(135deg, #6c63ff, #00d2ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none
    }

    .logo em {
      font-style: normal;
      -webkit-text-fill-color: #ff6b6b
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .hdr-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: all .2s
    }

    .hdr-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .page {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 64px);
      overflow: hidden
    }

    @media(max-width:900px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr
      }

      .sidebar {
        max-height: 45vh;
        overflow-y: auto
      }
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border2);
      overflow-y: auto;
      display: flex;
      flex-direction: column
    }

    .sidebar::-webkit-scrollbar {
      width: 4px
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px
    }

    .status-banner {
      padding: 24px 24px 20px;
      background: linear-gradient(135deg, rgba(108, 99, 255, .12), rgba(0, 210, 255, .06));
      border-bottom: 1px solid var(--border)
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px
    }

    .status-badge.active {
      background: rgba(0, 200, 150, .15);
      color: var(--green);
      border: 1px solid rgba(0, 200, 150, .3)
    }

    .status-badge.delivered {
      background: rgba(108, 99, 255, .15);
      color: var(--accent);
      border: 1px solid rgba(108, 99, 255, .3)
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulseDot 1.5s ease infinite
    }

    @keyframes pulseDot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(1.4)
      }
    }

    .order-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px
    }

    .order-sub {
      font-size: 13px;
      color: var(--muted)
    }

    .progress-wrap {
      margin-top: 16px
    }

    .progress-track {
      height: 6px;
      background: rgba(255, 255, 255, .06);
      border-radius: 10px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      transition: width .8s ease;
      position: relative
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 12px var(--accent3)
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted)
    }

    .eta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 24px
    }

    .eta-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      transition: border-color .3s
    }

    .eta-card:hover {
      border-color: var(--border)
    }

    .eta-val {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a8a5ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .eta-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .agent-card {
      margin: 0 24px 16px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif
    }

    .agent-info {
      flex: 1;
      min-width: 0
    }

    .agent-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 2px
    }

    .agent-detail {
      font-size: 12px;
      color: var(--muted)
    }

    .agent-call {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(0, 200, 150, .3);
      background: rgba(0, 200, 150, .1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
      font-size: 16px;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0
    }

    .agent-call:hover {
      background: rgba(0, 200, 150, .2);
      transform: scale(1.08)
    }

    .timeline-wrap {
      padding: 0 24px 24px;
      flex: 1
    }

    .timeline-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .timeline {
      position: relative;
      padding-left: 24px
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--border2)
    }

    .tl-item {
      position: relative;
      padding-bottom: 18px;
      padding-left: 16px
    }

    .tl-item:last-child {
      padding-bottom: 0
    }

    .tl-dot {
      position: absolute;
      left: -20px;
      top: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .3s;
      z-index: 1
    }

    .tl-item.done .tl-dot {
      background: var(--green);
      border-color: var(--green)
    }

    .tl-item.done .tl-dot::after {
      content: '\2713';
      font-size: 9px;
      color: #fff;
      font-weight: 700
    }

    .tl-item.current .tl-dot {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(108, 99, 255, .5);
      animation: pulseDot 1.5s ease infinite
    }

    .tl-event {
      font-size: 14px;
      font-weight: 600
    }

    .tl-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px
    }

    .map-container {
      position: relative;
      height: 100%
    }

    #map {
      height: 100%;
      width: 100%;
      background: var(--bg)
    }

    .map-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .map-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      transition: all .2s;
      backdrop-filter: blur(12px)
    }

    .map-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108, 99, 255, .1)
    }

    .map-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 500;
      background: rgba(19, 19, 26, .92);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      gap: 16px;
      font-size: 12px
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%
    }

    .legend-line {
      width: 20px;
      height: 3px;
      border-radius: 2px
    }

    .nav-instruction {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 500;
      background: rgba(19, 19, 26, .95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      max-width: 320px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .nav-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0
    }

    .nav-text {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4
    }

    .nav-dist {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px
    }

    .live-badge {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: rgba(255, 59, 48, .15);
      border: 1px solid rgba(255, 59, 48, .4);
      border-radius: 50px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #ff3b30;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(12px)
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff3b30;
      animation: pulseDot 1s ease infinite
    }

    .leaflet-tile-pane {
      filter: saturate(.3) brightness(.65) contrast(1.1)
    }

    .leaflet-control-zoom {
      border: 1px solid var(--border2) !important;
      border-radius: 12px !important;
      overflow: hidden
    }

    .leaflet-control-zoom a {
      background: var(--card) !important;
      color: var(--text) !important;
      border-color: var(--border2) !important
    }

    .leaflet-control-zoom a:hover {
      background: rgba(108, 99, 255, .15) !important;
      color: var(--accent) !important
    }

    .leaflet-popup-content-wrapper {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5)
    }

    .leaflet-popup-tip {
      background: var(--card)
    }
  </style>
</head>

<body>
  <header>
    <a class="logo" href="/dashboard">NEX<em>US</em></a>
    <div class="header-right">
      <a class="hdr-btn" href="/orders"><i class="fa fa-box"></i> My Orders</a>
      <a class="hdr-btn" href="/dashboard"><i class="fa fa-grid-2"></i> Dashboard</a>
    </div>
  </header>

  <div class="page">
    <div class="sidebar">
      <div class="status-banner">
        <div class="status-badge active" id="statusBadge">
          <div class="pulse"></div> <span id="statusText">Loading...</span>
        </div>
        <div class="order-title" id="orderTitle">Order #{{ order_id }}</div>
        <div class="order-sub" id="orderSub">Fetching delivery details...</div>
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <div class="progress-labels"><span>Picked Up</span><span>In Transit</span><span>Delivered</span></div>
        </div>
      </div>
      <div class="eta-row">
        <div class="eta-card">
          <div class="eta-val" id="etaVal">--</div>
          <div class="eta-label">ETA (mins)</div>
        </div>
        <div class="eta-card">
          <div class="eta-val" id="distVal">--</div>
          <div class="eta-label">Remaining KM</div>
        </div>
      </div>
      <div class="agent-card">
        <div class="agent-avatar" id="agentAvatar">?</div>
        <div class="agent-info">
          <div class="agent-name" id="agentName">Loading...</div>
          <div class="agent-detail" id="agentVehicle">--</div>
        </div>
        <div class="agent-call" title="Call Agent"><i class="fa fa-phone"></i></div>
      </div>
      <div class="timeline-wrap">
        <div class="timeline-title"><i class="fa fa-route" style="margin-right:6px"></i> Delivery Timeline</div>
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <div class="map-container">
      <div id="map"></div>
      <div class="live-badge">
        <div class="live-dot"></div> LIVE TRACKING
      </div>
      <div class="nav-instruction" id="navInstruction">
        <div class="nav-icon"><i class="fa fa-location-arrow"></i></div>
        <div>
          <div class="nav-text" id="navText">Calculating route...</div>
          <div class="nav-dist" id="navDist"></div>
        </div>
      </div>
      <div class="map-overlay">
        <div class="map-btn" onclick="centerOnAgent()" title="Center on Agent"><i class="fa fa-crosshairs"></i></div>
        <div class="map-btn" onclick="fitFullRoute()" title="Fit Route"><i class="fa fa-expand"></i></div>
        <div class="map-btn" onclick="toggleSatellite()" title="Toggle View"><i class="fa fa-layer-group"></i></div>
      </div>
      <div class="map-legend">
        <div class="legend-item">
          <div class="legend-line" style="background:var(--green)"></div> Completed
        </div>
        <div class="legend-item">
          <div class="legend-line" style="background:var(--accent);opacity:.5"></div> Remaining
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ff3b30"></div> Agent
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--accent3)"></div> Destination
        </div>
      </div>
    </div>
  </div>

  <script>var ORDER_ID = parseInt(window.location.pathname.split('/').pop());</script>
  <script>
    var OSM_URL = 'https://' + '{s}' + '.tile.openstreetmap.org/' + '{z}' + '/' + '{x}' + '/' + '{y}' + '.png';
    var SAT_URL = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/' + '{z}' + '/' + '{y}' + '/' + '{x}';
    var map, agentMarker, originMarker, destMarker;
    var completedLine, remainingLine;
    var isSatellite = false;
    var tileLayer;

    function initMap() {
      map = L.map('map', { zoomControl: true, attributionControl: false }).setView([19.076, 72.877], 12);
      tileLayer = L.tileLayer(OSM_URL, { maxZoom: 19 }).addTo(map);
      completedLine = L.polyline([], { color: '#00c896', weight: 5, opacity: 0.9, lineCap: 'round', lineJoin: 'round' }).addTo(map);
      remainingLine = L.polyline([], { color: '#6c63ff', weight: 4, opacity: 0.4, dashArray: '10 8', lineCap: 'round' }).addTo(map);
    }

    var agentIcon = L.divIcon({
      className: '',
      html: '<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff3b30,#ff6b6b);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,59,48,.5);border:3px solid #fff"><i class="fa fa-truck" style="color:#fff;font-size:16px"></i></div>',
      iconSize: [40, 40], iconAnchor: [20, 20]
    });

    var originIcon = L.divIcon({
      className: '',
      html: '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#00d2ff);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(108,99,255,.4);border:2px solid #fff"><i class="fa fa-warehouse" style="color:#fff;font-size:12px"></i></div>',
      iconSize: [32, 32], iconAnchor: [16, 16]
    });

    var destIcon = L.divIcon({
      className: '',
      html: '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#00d2ff,#00c896);display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(0,210,255,.4);border:2px solid #fff"><i class="fa fa-flag-checkered" style="color:#fff;font-size:14px"></i></div>',
      iconSize: [36, 36], iconAnchor: [18, 18]
    });

    function updateTracking(data) {
      document.getElementById('statusText').textContent = data.status;
      if (data.progress_pct >= 100) {
        var badge = document.getElementById('statusBadge');
        badge.className = 'status-badge delivered';
        badge.innerHTML = '<i class="fa fa-check-circle"></i> <span>' + data.status + '</span>';
      }
      document.getElementById('orderSub').textContent = data.agent.name + ' \u00b7 ' + data.agent.vehicle + ' \u00b7 ' + data.agent.vehicle_number;
      document.getElementById('progressFill').style.width = Math.min(100, data.progress_pct) + '%';
      document.getElementById('etaVal').textContent = data.eta_minutes;
      document.getElementById('distVal').textContent = data.remaining_km;
      document.getElementById('agentName').textContent = data.agent.name;
      document.getElementById('agentAvatar').textContent = data.agent.name.charAt(0);
      document.getElementById('agentVehicle').textContent = data.agent.vehicle + ' \u00b7 ' + data.agent.vehicle_number;

      var pct = data.progress_pct;
      var navMsg = 'Heading to destination...';
      var navIcon = 'fa-location-arrow';
      if (pct < 5) { navMsg = 'Agent is picking up your order'; navIcon = 'fa-box'; }
      else if (pct < 30) { navMsg = 'Departing from warehouse'; navIcon = 'fa-route'; }
      else if (pct < 60) { navMsg = 'En route \u2014 on current road'; navIcon = 'fa-road'; }
      else if (pct < 85) { navMsg = 'Approaching your area'; navIcon = 'fa-map-pin'; }
      else if (pct < 100) { navMsg = 'Almost there! Agent nearby'; navIcon = 'fa-bell'; }
      else { navMsg = 'Delivered successfully!'; navIcon = 'fa-circle-check'; }
      document.getElementById('navText').textContent = navMsg;
      document.getElementById('navDist').textContent = data.remaining_km + ' km remaining \u00b7 ETA ' + data.eta_minutes + ' min';
      document.querySelector('#navInstruction .nav-icon').innerHTML = '<i class="fa ' + navIcon + '"></i>';

      var tlEl = document.getElementById('timeline');
      var lastDoneIdx = -1;
      for (var ti = 0; ti < data.timeline.length; ti++) { if (data.timeline[ti].done) lastDoneIdx = ti; }
      var html = '';
      for (var i = 0; i < data.timeline.length; i++) {
        var t = data.timeline[i];
        var cls = t.done ? 'done' : (i === lastDoneIdx + 1 ? 'current' : '');
        html += '<div class="tl-item ' + cls + '"><div class="tl-dot"></div><div class="tl-event">' + t.event + '</div><div class="tl-time">' + t.time + '</div></div>';
      }
      tlEl.innerHTML = html;

      var agentPos = [data.current_location.lat, data.current_location.lon];
      var originPos = [data.origin.lat, data.origin.lon];
      var destPos = [data.destination.lat, data.destination.lon];

      if (!agentMarker) {
        agentMarker = L.marker(agentPos, { icon: agentIcon, zIndexOffset: 1000 }).addTo(map).bindPopup('<strong>' + data.agent.name + '</strong><br>' + data.agent.vehicle);
        originMarker = L.marker(originPos, { icon: originIcon }).addTo(map).bindPopup('<strong>Warehouse</strong><br>' + data.origin.label);
        destMarker = L.marker(destPos, { icon: destIcon }).addTo(map).bindPopup('<strong>Destination</strong><br>' + data.destination.label);
        fitFullRoute();
      } else {
        agentMarker.setLatLng(agentPos);
      }
      if (data.completed_route) completedLine.setLatLngs(data.completed_route);
      if (data.remaining_route) remainingLine.setLatLngs(data.remaining_route);
    }

    function fetchTracking() {
      fetch('/api/tracking/' + ORDER_ID, { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.success) updateTracking(d);
          else document.getElementById('statusText').textContent = d.error || 'Error';
        })
        .catch(function (e) { console.error('Tracking error:', e); });
    }

    function centerOnAgent() { if (agentMarker) map.setView(agentMarker.getLatLng(), 15, { animate: true }); }

    function fitFullRoute() {
      var bounds = [];
      if (agentMarker) bounds.push(agentMarker.getLatLng());
      if (originMarker) bounds.push(originMarker.getLatLng());
      if (destMarker) bounds.push(destMarker.getLatLng());
      if (bounds.length) map.fitBounds(bounds, { padding: [60, 60], animate: true });
    }

    function toggleSatellite() {
      map.removeLayer(tileLayer);
      isSatellite = !isSatellite;
      tileLayer = L.tileLayer(isSatellite ? SAT_URL : OSM_URL, { maxZoom: 19 }).addTo(map);
    }

    initMap();
    fetchTracking();
    setInterval(fetchTracking, 3000);
  </script>
</body>

</html>
